<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auction Detail</title>

</head>

<body class="detail-bg">

<nav class="detail-nav">
  <div class="nav-left">
    <span class="logo">AuctionBazaar</span>
  </div>

  <div class="nav-right">
    <a href="auctions.html">All Auctions</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="detail-timer-wrapper">
  <div id="auctionTimeBar" class="detail-time-bar">
    <div class="time-left">🔥Auction Timer</div>

    <div class="detail-time-right">
      <span id="timeLabel">Starts In</span>
      <span id="auctionTimer">--</span>
    </div>
  </div>
</div>

<div class="detail-container">

  <!-- LEFT -->
  <div class="detail-left">
    <div class="detail-image-box">
      <button class="arrow left-arrow" onclick="prevImage()">❮</button>
      <img id="mainImage" src="" alt="Product Image">
      <button class="arrow right-arrow" onclick="nextImage()">❯</button>
    </div>

    <div id="thumbContainer" class="detail-thumbs"></div>

    <div class="bid-buttons" id="bidSection" style="display:none;">
      <button class="raise-btn" onclick="raiseBid()">Raise Bid</button>
      <button class="monster-btn" onclick="monsterBid()">🔥 Monster Bid</button>
    </div>

    <p id="bidMsg"></p>
  </div>

  <!-- RIGHT -->
  <div class="detail-right">
    <h2 id="title">Loading...</h2>

    <div class="info">
      <p><b>Description:</b> <span id="description"></span></p>
      <p><b>Status:</b> <span id="status"></span></p>
      <p><b>Base Price:</b> ₹<span id="basePrice"></span></p>
    </div>

    <div class="detail-price">
      <span id="priceLabel">Current Price</span> ₹<span id="currentBid">0</span>
    </div>
    
    <div class="winner-box" id="winnerSection" style="display:none;">
      🏆 Winner: <span id="winnerName"></span>
    </div>

    <div class="history">
      <h3>Bid History</h3>
      <ul id="bidHistory"></ul>
    </div>
  </div>

</div>

<link rel="stylesheet" href="css/style.css">
<script src="js/auction-detail.js"></script>
</body>
</html>
